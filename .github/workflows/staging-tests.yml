# ─── KuuNyi Staging Tests — API + Security Audit ──────────────────
# Runs after Vercel deploys the staging branch.
# Waits for the staging URL to be ready, then runs api-tests.sh
# and security-audit.sh in parallel.
#
# Required secret: STAGING_URL (e.g. https://edu-enroll-xi-git-staging-xxx.vercel.app)

name: Staging Tests

on:
  push:
    branches: [staging]

jobs:
  wait-for-deploy:
    name: Wait for Staging Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel to build and deploy
        run: |
          echo "Waiting for Vercel staging deploy (up to 5 min)..."
          # Vercel needs time to detect push, build Next.js, and deploy.
          # Poll every 30s for up to 5 minutes, checking that the deployment
          # is reachable and has updated (not serving stale code).
          for i in $(seq 1 10); do
            sleep 30
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" \
              -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
              "${{ secrets.STAGING_URL }}")
            echo "Attempt ${i}/10 ($(( i * 30 ))s): HTTP ${STATUS}"
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
              echo "Staging is reachable. Waiting 30s more for deploy to stabilize..."
              sleep 30
              echo "Staging is ready."
              exit 0
            fi
          done
          echo "Staging not reachable after 5 minutes."
          exit 1

  api-tests:
    name: API Tests
    needs: wait-for-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run API tests
        run: bash api-tests.sh
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          TEST_EMAIL: ${{ secrets.STAGING_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.STAGING_TEST_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

  security-audit:
    name: Security Audit
    needs: wait-for-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tenant isolation audit
        run: bash security-audit.sh
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
